<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JurisBot - Assistente Jurídico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="text-center my-5">
            <h1 class="display-4">🤖 JurisBot</h1>
            <p class="lead">Seu assistente jurídico inteligente para pesquisa de jurisprudência</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Chat Interface -->
                <div class="card shadow mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Chat com o Assistente</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="chat-messages" id="chat-messages" style="height: 400px; overflow-y: auto; padding: 20px;">
                            <div class="message bot-message">
                                <div class="message-content">
                                    Olá! Como posso ajudar você hoje com suas questões jurídicas?
                                </div>
                            </div>
                        </div>
                        <div class="typing-indicator d-none" id="typing-indicator">
                            <div class="d-flex align-items-center">
                                <div class="spinner-border spinner-border-sm me-2" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <span>Assistente está digitando...</span>
                            </div>
                        </div>
                        <div class="chat-input p-3 border-top">
                            <div class="input-group">
                                <input type="text" class="form-control" id="message-input" placeholder="Digite sua mensagem..." autocomplete="off">
                                <button class="btn btn-primary" id="send-button">Enviar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
